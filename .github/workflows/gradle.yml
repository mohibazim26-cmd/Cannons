name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Forza GitHub a installare Gradle 8.5 (ottimo per Java 17) senza cercare file locali
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    # Compila usando il comando globale "gradle", non "./gradlew"
    - name: Build with Gradle
      run: gradle build

    # Prende il file .jar finale e lo carica nei dettagli della build su GitHub
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Built-Plugin-Jar
        path: build/libs/*.jar
